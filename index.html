<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日本の四季の天気</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
}

#map {
  position: relative;
  width: 700px;
  margin: auto;
}

#map img {
  width: 100%;
}

/* ===== 気団 ===== */
.airmass {
  position: absolute;
  width: 600px;
  height: 350px;
  border-radius: 50%;
  filter: blur(30px);
  opacity: 0.8;
  cursor: grab;
  z-index: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  transition: transform 0.3s;
}

/* ===== 気圧 ===== */
.pressure {
  position: absolute;
  font-size: 32px;
  font-weight: bold;
  z-index: 20;
}

.high { color: red; }
.low { color: blue; }

/* ===== 台風 ===== */
#typhoon {
  position: absolute;
  width: 60px;
  height: 60px;
  bottom: -140px;
  left: 20px;

  border: 3px solid purple;
  border-radius: 50%;
  background: white;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 12px;
  font-weight: bold;
  color: purple;

  z-index: 1000;
  cursor: grab;
}

/* ===== 配置 ===== */
#siberia { background: linear-gradient(to right, blue, transparent); top: -15%; left: -35%; }
#ogasawara { background: linear-gradient(to top, red, transparent); top: 55%; left: 50%; }
#okhotsk { background: linear-gradient(to bottom, cyan, transparent); top: -40%; left: 50%; }

#high_siberia { top: 5%; left: 5%; }
#high_ogasawara { top: 70%; left: 70%; }
#high_okhotsk { top: 10%; left: 70%; }

#low_front { top: 45%; left: 40%; }
#low_general { top: 40%; left: 50%; }

/* ===== ボタン ===== */
#buttons {
  position: absolute;
  bottom: -150px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  background: rgba(255,255,255,0.85);
  padding: 6px;
  border-radius: 8px;
}

button {
  margin: 3px;
  padding: 6px 10px;
}

#pressureBtn {
  background: #444;
  color: white;
  border-radius: 20px;
  padding: 6px 14px;
}

#pressureBtn.off {
  background: #ccc;
  color: black;
}

#typhoonBtn {
  background: purple;
  color: white;
  border-radius: 20px;
  padding: 6px 14px;
}

#typhoonBtn.off {
  background: #ccc;
  color: black;
}
</style>
</head>

<body>

<h2>日本の四季の天気</h2>

<div id="map">
  <img src="map.png">

  <!-- 高 -->
  <div id="high_siberia" class="pressure high">高</div>
  <div id="high_ogasawara" class="pressure high">高</div>
  <div id="high_okhotsk" class="pressure high">高</div>

  <!-- 低 -->
  <div id="low_front" class="pressure low">低</div>
  <div id="low_general" class="pressure low">低</div>

  <!-- 台風 -->
  <div id="typhoon">台風</div>

  <div id="buttons">
    <button onclick="updateSeason(0)">春</button>
    <button onclick="updateSeason(1)">梅雨</button>
    <button onclick="updateSeason(2)">夏</button>
    <button onclick="updateSeason(3)">秋</button>
    <button onclick="updateSeason(4)">秋雨</button>
    <button onclick="updateSeason(5)">冬</button>
    <button id="pressureBtn" onclick="togglePressure()">気圧</button>
    <button id="typhoonBtn" onclick="toggleTyphoon()">台風</button>
  </div>

  <div id="siberia" class="airmass">シベリア</div>
  <div id="ogasawara" class="airmass">小笠原</div>
  <div id="okhotsk" class="airmass">オホーツク</div>
</div>

<script>
const typhoon = document.getElementById("typhoon");
const typhoonBtn = document.getElementById("typhoonBtn");
const ogasawara = document.getElementById("ogasawara");
const map = document.getElementById("map");

/* ===== 台風表示 ===== */
let typhoonVisible = true;

/* ===== 台風ドラッグ ===== */
let isDragging = false;
let offsetX, offsetY;

typhoon.addEventListener("pointerdown", e => {
  isDragging = true;

  const rect = typhoon.getBoundingClientRect();
  offsetX = e.clientX - rect.left;
  offsetY = e.clientY - rect.top;

  typhoon.setPointerCapture(e.pointerId);
});

typhoon.addEventListener("pointermove", e => {
  if (!isDragging) return;

  const mapRect = map.getBoundingClientRect();

  let newX = e.clientX - mapRect.left - offsetX;
  let newY = e.clientY - mapRect.top - offsetY;

  const oRect = ogasawara.getBoundingClientRect();

  const oCenterX = oRect.left - mapRect.left + oRect.width / 2;
  const oCenterY = oRect.top - mapRect.top + oRect.height / 2;

  let tCenterX = newX + typhoon.offsetWidth / 2;
  let tCenterY = newY + typhoon.offsetHeight / 2;

  let dx = tCenterX - oCenterX;
  let dy = tCenterY - oCenterY;

  let dist2 = dx*dx + dy*dy;
  let radius = oRect.width / 2;

  /* ★侵入禁止＋なめらか補正 */
  if(dist2 < radius * radius){
    let dist = Math.sqrt(dist2) || 1;
    let ratio = radius / dist;

    dx *= ratio;
    dy *= ratio;

    tCenterX = oCenterX + dx;
    tCenterY = oCenterY + dy;

    newX = tCenterX - typhoon.offsetWidth / 2;
    newY = tCenterY - typhoon.offsetHeight / 2;
  }

  typhoon.style.left = newX + "px";
  typhoon.style.top = newY + "px";
});

typhoon.addEventListener("pointerup", () => {
  isDragging = false;
});

/* ===== 台風トグル ===== */
function toggleTyphoon(){
  typhoonVisible = !typhoonVisible;
  typhoon.style.display = typhoonVisible ? "flex" : "none";
  typhoonBtn.classList.toggle("off");
}

/* ===== 既存処理 ===== */
const siberia = document.getElementById("siberia");
const ogasawaraEl = document.getElementById("ogasawara");
const okhotsk = document.getElementById("okhotsk");

const Hs = document.getElementById("high_siberia");
const Ho = document.getElementById("high_ogasawara");
const Hok = document.getElementById("high_okhotsk");

const Lf = document.getElementById("low_front");
const Lg = document.getElementById("low_general");

const pressureBtn = document.getElementById("pressureBtn");

let pressureVisible = true;

const sizeData = [
  { s:0.8, o:0.8, k:0.3, front:false, low:true },
  { s:0.3, o:1.2, k:1.3, front:true, low:false },
  { s:0.2, o:1.5, k:0.3, front:false, low:true },
  { s:0.7, o:1.1, k:0.2, front:false, low:true },
  { s:0.8, o:1.0, k:1.0, front:true, low:false },
  { s:1.5, o:0.3, k:0.0, front:false, low:true }
];

const lowPosition = [
  { top:"40%", left:"50%" },
  null,
  { top:"30%", left:"20%" },
  { top:"40%", left:"50%" },
  null,
  { top:"55%", left:"75%" }
];

function updateSeason(i){
  let d = sizeData[i];

  siberia.style.transform = `scale(${d.s})`;
  ogasawaraEl.style.transform = `scale(${d.o})`;
  okhotsk.style.transform = `scale(${d.k})`;

  if(pressureVisible){
    Hs.style.display = d.s > 0.5 ? "block" : "none";
    Ho.style.display = d.o > 0.5 ? "block" : "none";
    Hok.style.display = d.k > 0.5 ? "block" : "none";

    Lf.style.display = d.front ? "block" : "none";

    if(d.low){
      Lg.style.display = "block";
      Lg.style.top = lowPosition[i].top;
      Lg.style.left = lowPosition[i].left;
    } else {
      Lg.style.display = "none";
    }
  }
}

function togglePressure(){
  pressureVisible = !pressureVisible;

  const all = document.querySelectorAll(".pressure");

  all.forEach(el => {
    el.style.display = pressureVisible ? "block" : "none";
  });

  pressureBtn.classList.toggle("off");
}

updateSeason(0);
</script>

</body>
</html>
